# Production overrides for Azure Container Apps / AKS
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  traefik:
    profiles: []  # Always enabled in production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  postgres:
    ports: []  # No external port in production
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  elasticsearch:
    ports: []  # No external port in production
    environment:
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  web:
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: '1'

  ingestion-worker:
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: 4G
          cpus: '2'
