apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeep-ingestion-worker
  namespace: gatekeep
  labels:
    app: gatekeep-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gatekeep-worker
  template:
    metadata:
      labels:
        app: gatekeep-worker
    spec:
      containers:
        - name: worker
          image: ${ACR_NAME}.azurecr.io/gatekeep-worker:${IMAGE_TAG}
          command: ["celery", "-A", "workers.ingestion.worker", "worker", "--loglevel=info", "--concurrency=2"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: database-url
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch:9200"
            - name: ELASTICSEARCH_USER
              value: "elastic"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: elastic-password
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: redis-url
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: azure-storage-connection
            - name: STIRLING_PDF_URL
              value: "http://stirling-pdf:8080"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
