apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeep-web
  namespace: gatekeep
  labels:
    app: gatekeep-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gatekeep-web
  template:
    metadata:
      labels:
        app: gatekeep-web
    spec:
      containers:
        - name: web
          image: ${ACR_NAME}.azurecr.io/gatekeep-web:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: database-url
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch:9200"
            - name: ELASTICSEARCH_USER
              value: "elastic"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: elastic-password
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: redis-url
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: azure-storage-connection
            - name: AZURE_STORAGE_CONTAINER
              value: "gatekeep-artifacts"
            - name: ENTRA_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: entra-tenant-id
            - name: ENTRA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: entra-client-id
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: entra-client-secret
            - name: ENTRA_REDIRECT_URI
              value: "https://gatekeep.yourfirm.com/auth/callback"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gatekeep-secrets
                  key: jwt-secret
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gatekeep-web
  namespace: gatekeep
spec:
  selector:
    app: gatekeep-web
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
