apiVersion: v1
kind: Secret
metadata:
  name: gatekeep-secrets
  namespace: gatekeep
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://gatekeep:CHANGE_ME@gatekeep-db.postgres.database.azure.com:5432/gatekeep"
  elastic-password: "CHANGE_ME_ELASTIC_PASS"
  redis-url: "redis://:CHANGE_ME_REDIS@redis:6379/0"
  azure-storage-connection: "DefaultEndpointsProtocol=https;AccountName=CHANGE_ME;AccountKey=CHANGE_ME;EndpointSuffix=core.windows.net"
  entra-tenant-id: "CHANGE_ME_TENANT_ID"
  entra-client-id: "CHANGE_ME_CLIENT_ID"
  entra-client-secret: "CHANGE_ME_CLIENT_SECRET"
  jwt-secret: "CHANGE_ME_JWT_SECRET_MIN_32_CHARS"
